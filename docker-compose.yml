version: '3.8'

services:

  app:
    build: .
    container_name: bsa_app

    working_dir: /var/www

    volumes:
      - .:/var/www

  nginx:
    image: nginx:latest
    container_name: bsa_nginx

    ports:
      - "80:80"

    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app